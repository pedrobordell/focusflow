<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        // Aplica el tema guardado antes de pintar para evitar parpadeo
        if (localStorage.getItem("theme") === "light") {
            document.documentElement.classList.add("light");
        }
    </script>
    <title>FocusFlow - Edit habit</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" sizes="48x48" type="image/png" href="img/favicons.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/authentication.js"></script>
    <script src="js/api.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/edit-habit.js"></script>
</head>
<body>
    <header class="mainHeader">
        <div class="container">
            <div class="navigation">
                <div class="navLeft">
                    <button type="button" id="navToggle" class="navToggle" aria-label="Open sections" aria-expanded="false">☰</button>
                    <div class="logo">
                        <h1><a href="index.html">FocusFlow</a></h1>
                        <img src="img/favicons.png" width="64">
                    </div>
                    <div id="sectionMenu" class="sectionMenu" role="menu" aria-hidden="true">
                        <div class="sectionMenuHeader">
                            <h2 class="sectionMenuTitle">FocusFlow</h2>
                            <button type="button" id="sectionMenuClose" class="sectionMenuClose" aria-label="Close menu">✕</button>
                        </div>
                        <nav class="sectionList" id="sectionList"></nav>
                    </div>
                </div>
                <nav class="menu">
                    <ul id="subsectionNav" class="subsectionNav"></ul>
                    <ul class="menuActions">
                        <li><a id="logoutBtn" class="logoutBtn">Logout</a></li>
                        <li><button type="button" id="themeToggle" class="themeToggle" aria-label="Toggle theme">☀</button></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <section>
        <div class="container">
            <div class="requiresAuth" id="editHabitContainer">
                <div class="dashboardHeader">
                    <h2>Edit habit</h2>
                </div>
                <form class="habitForm" id="editHabitForm" name="editHabitForm">
                    <div class="textArea">
                        <label for="habitName">Name</label>
                        <input type="text" id="habitName" name="habitName">
                    </div>
                    <div class="textArea">
                        <label for="habitType">Type</label>
                        <select id="habitType" name="habitType">
                            <option value="" disabled selected>-- Select a category --</option>
                            <option value="Health">Health</option>
                            <option value="Fitness">Fitness</option>
                            <option value="Study">Study</option>
                            <option value="Productivity">Productivity</option>
                            <option value="Mindfulness">Mindfulness</option>
                            <option value="Social">Social</option>
                            <option value="Finance">Finance</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="textArea">
                        <label for="habitImportance">Importance</label>
                        <div class="rangeRow">
                            <input type="range" id="habitImportance" name="habitImportance" min="1" max="3" step="1" value="2">
                            <span class="rangeValue" id="importanceValue">Medium</span>
                        </div>
                    </div>
                    <div class="formActions">
                        <button type="submit" class="submitBtn">Confirm</button>
                        <button type="button" class="cancelBtn" id="cancelBtn">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="footerTop">
            <div class="footerColumn">
                <div class="footerLogo">
                    <h3>FocusFlow</h3>
                </div>
                <p>Slogan todo</p>
            </div>
            <div class="footerColumn">
                <h4>Company</h4>
                <ul>
                    <li><a href="#">About us</a></li>
                    <li><a href="#">Security</a></li>
                    <li><a href="#">Terms & Privacy</a></li>
                </ul>
            </div>
            <div class="footerColumn">
                <h4>Quick links</h4>
                <ul>
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="profile.html">Profile</a></li>
                    <li><a href="#">Todo</a></li>
                </ul>
            </div>
        </div>
        <div class="footerBot">
            <p>&copy; 2026 FocusFlow. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
